<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Speed Typer Elite</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; overflow-x: hidden; scroll-behavior: smooth; }
        .main-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; }
        .timer-box { font-size: 3rem; font-family: 'Courier New'; color: #f1c40f; margin-bottom: 20px; text-shadow: 0 0 15px rgba(241, 196, 15, 0.4); }
        .container { background: #151515; padding: 40px; border-radius: 25px; border: 1px solid #333; width: 85%; max-width: 850px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #display { font-size: 1.8rem; margin-bottom: 25px; text-align: left; line-height: 1.6; color: #444; min-height: 100px; }
        .correct { color: #2ecc71; text-shadow: 0 0 10px rgba(46, 204, 113, 0.3); }
        .incorrect { color: #e74c3c; background: rgba(231, 76, 60, 0.1); border-radius: 5px; }
        .current { border-left: 3px solid #3498db; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Вкладки статистики */
        .stats-container { margin-top: 40px; width: 85%; max-width: 850px; background: #111; border-radius: 20px; border: 1px solid #222; overflow: hidden; }
        .tabs { display: flex; background: #1a1a1a; }
        .tab-btn { flex: 1; padding: 15px; border: none; background: none; color: #555; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 1rem; }
        .tab-btn.active { color: #2ecc71; background: #111; border-bottom: 3px solid #2ecc71; }
        .tab-content { padding: 25px; max-height: 250px; overflow-y: auto; text-align: left; }
        .stat-line { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-family: monospace; }

        /* Секретка */
        .void { height: 3000px; background: linear-gradient(#0a0a0a, #000); }
        .secret-gate { height: 200px; display: flex; align-items: center; justify-content: center; background: #000; }
        #master-key { background: transparent; border: none; color: #050505; outline: none; font-size: 10px; width: 50px; }

        input#main-typer { position: absolute; opacity: 0; }
        .controls { margin-top: 25px; }
        .btn { background: #222; color: #eee; border: 1px solid #444; padding: 12px 25px; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn:hover { border-color: #2ecc71; background: #2a2a2a; }
    </style>
</head>
<body onclick="document.getElementById('main-typer').focus()">

    <div class="main-screen">
        <div class="timer-box" id="timer-display">00:00:00</div>
        
        <div class="container">
            <div id="display">Загрузка...</div>
            <input type="text" id="main-typer" autocomplete="off">
            <div class="controls">
                <button class="btn" onclick="toggleMode()">Режим: <span id="mode-label">Секундомер</span></button>
                <button class="btn" onclick="resetGame()">Заново</button>
            </div>
        </div>

        <div class="stats-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="switchTab('records')">РЕКОРДЫ</button>
                <button class="tab-btn" onclick="switchTab('history')">ИСТОРИЯ</button>
            </div>
            <div id="tab-records" class="tab-content"></div>
            <div id="tab-history" class="tab-content" style="display:none"></div>
        </div>
    </div>

    <!-- Огромная пустота, чтобы друг не догадался -->
    <div class="void"></div>

    <div class="secret-gate">
        <input type="password" id="master-key" placeholder="system_lock" maxlength="5">
    </div>

    <audio id="click-s" src="https://www.soundjay.com"></audio>
    <audio id="err-s" src="https://www.soundjay.com"></audio>

    <script>
        const texts = [
            "Будущее принадлежит тем, кто верит в красоту своих мечтаний.",
            "Сложные времена рождают сильных людей, сильные люди создают легкие времена.",
            "Успех — это не отсутствие неудач, это умение идти через них с высоко поднятой головой.",
            "Великие умы обсуждают идеи, средние умы обсуждают события, мелкие умы обсуждают людей."
        ];

        let currentStr = "", startT, timerInt, active = false, god = false, countDn = false;

        const typer = document.getElementById('main-typer');
        const timerOut = document.getElementById('timer-display');
        const key = document.getElementById('master-key');

        function resetGame() {
            clearInterval(timerInt);
            active = false;
            typer.value = "";
            currentStr = texts[Math.floor(Math.random() * texts.length)];
            timerOut.innerText = countDn ? "00:45:00" : "00:00:00";
            draw();
            refreshStats();
        }

        function draw() {
            const val = typer.value;
            document.getElementById('display').innerHTML = currentStr.split('').map((c, i) => {
                let s = i < val.length ? (val[i] === c ? "correct" : "incorrect") : (i === val.length ? "current" : "");
                return `<span class="${s}">${c}</span>`;
            }).join('');
        }

        // Авто-фокус на секретку при скролле вниз
        window.onscroll = () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                key.focus();
            }
        };

        key.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && key.value === "22800") {
                god = true;
                key.value = "";
                window.scrollTo(0, 0); // Улетаем вверх
                setTimeout(() => { typer.focus(); }, 600);
            }
        });

        typer.addEventListener('keydown', (e) => {
            if (e.key.length === 1) {
                document.getElementById('click-s').currentTime = 0;
                document.getElementById('click-s').play();
                
                if (!active) {
                    active = true;
                    startT = Date.now();
                    timerInt = setInterval(tick, 10);
                }

                if (god) {
                    e.preventDefault();
                    if (typer.value.length < currentStr.length) {
                        typer.value += currentStr[typer.value.length];
                        checkWin();
                    }
                } else if (e.key !== currentStr[typer.value.length]) {
                    document.getElementById('err-s').play();
                }
            }
        });

        typer.addEventListener('input', checkWin);

        function checkWin() {
            draw();
            if (typer.value === currentStr) {
                clearInterval(timerInt);
                save(timerOut.innerText);
                alert("Готово! Твой результат: " + timerOut.innerText);
                resetGame();
            }
        }

        function tick() {
            let d = countDn ? (startT + 45000) - Date.now() : Date.now() - startT;
            if (d <= 0 && countDn) { clearInterval(timerInt); alert("Время вышло!"); resetGame(); return; }
            let m = Math.floor(d / 60000), s = Math.floor((d % 60000) / 1000), ms = Math.floor((d % 1000) / 10);
            timerOut.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms).padStart(2,'0')}`;
        }

        function save(t) {
            let h = JSON.parse(localStorage.getItem('scores') || '[]');
            h.push({ t, raw: Date.now() - startT, d: new Date().toLocaleTimeString(), m: countDn ? 'DN' : 'UP' });
            localStorage.setItem('scores', JSON.stringify(h));
            refreshStats();
        }

        function refreshStats() {
            let h = JSON.parse(localStorage.getItem('scores') || '[]');
            document.getElementById('tab-history').innerHTML = h.slice().reverse().map(i => `<div class="stat-line"><span>${i.d}</span> <b>${i.t}</b></div>`).join('') || "Пусто";
            document.getElementById('tab-records').innerHTML = h.sort((a,b) => a.raw - b.raw).slice(0, 5).map(i => `<div class="stat-line"><span>TOP</span> <b>${i.t}</b></div>`).join('') || "Нет рекордов";
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + t).style.display = 'block';
            event.target.classList.add('active');
        }

        function toggleMode() { countDn = !countDn; document.getElementById('mode-label').innerText = countDn ? "Отсчет" : "Секундомер"; resetGame(); }

        resetGame();
    </script>
</body>
</html>
