<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Speed Typer Pro + Stats</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; margin: 0; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; }
        .main-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 50px; width: 100%; }
        .timer-box { font-size: 2.5rem; font-family: 'Courier New'; color: #f1c40f; margin-bottom: 20px; }
        .container { background: #151515; padding: 30px; border-radius: 20px; border: 1px solid #333; width: 85%; max-width: 800px; text-align: center; }
        #display { font-size: 1.5rem; margin-bottom: 20px; text-align: left; line-height: 1.5; color: #555; min-height: 80px; }
        .correct { color: #2ecc71; }
        .incorrect { color: #e74c3c; background: rgba(231, 76, 60, 0.1); }
        .current { border-left: 3px solid #3498db; animation: blink 0.8s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Вкладки */
        .stats-container { margin-top: 30px; width: 85%; max-width: 800px; background: #151515; border-radius: 15px; border: 1px solid #333; overflow: hidden; }
        .tabs { display: flex; background: #222; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: none; color: #888; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { color: #2ecc71; background: #151515; border-bottom: 2px solid #2ecc71; }
        .tab-content { padding: 20px; max-height: 300px; overflow-y: auto; text-align: left; font-size: 0.9rem; }
        .stat-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #222; }
        .stat-item:last-child { border: none; }

        .spacer { height: 1500px; width: 100%; }
        .secret-area { height: 100px; background: #000; display: flex; justify-content: center; align-items: center; }
        #secret-input { background: transparent; border: none; color: #111; outline: none; width: 100px; }
        input#main-input { position: absolute; opacity: 0; }
        button.action-btn { background: #222; color: #888; border: 1px solid #444; padding: 8px 15px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body onclick="document.getElementById('main-input').focus()">

    <div class="main-screen">
        <div class="timer-box" id="timer-display">00:00:00</div>
        
        <div class="container">
            <div id="display">Нажмите любую клавишу для старта...</div>
            <input type="text" id="main-input" autocomplete="off">
            <div class="btns">
                <button class="action-btn" onclick="toggleMode()">Режим: <span id="mode-text">Секундомер</span></button>
                <button class="action-btn" onclick="resetGame()">Заново</button>
            </div>
        </div>

        <div class="stats-container">
            <div class="tabs">
                <button class="tab-btn active" onclick="showTab('records')">РЕКОРДЫ</button>
                <button class="tab-btn" onclick="showTab('history')">ИСТОРИЯ</button>
            </div>
            <div id="tab-records" class="tab-content"></div>
            <div id="tab-history" class="tab-content" style="display:none"></div>
        </div>
    </div>

    <div class="spacer"></div>
    <div class="secret-area"><input type="password" id="secret-input" maxlength="5"></div>

    <audio id="snd-click" src="https://www.soundjay.com"></audio>
    <audio id="snd-error" src="https://www.soundjay.com"></audio>

    <script>
        const texts = ["Успех — это не финал, неудача — не фатальна.", "Будущее зависит от того, что вы делаете сегодня.", "Сложные дороги часто ведут к прекрасным местам.", "Важно не то, как быстро ты идешь, а то, что ты не останавливаешься."];
        let currentText = "", startTime, timerInterval, gameStarted = false, isGodMode = false, isCountDown = false;

        const mainInput = document.getElementById('main-input');
        const timerDisplay = document.getElementById('timer-display');

        function resetGame() {
            clearInterval(timerInterval);
            gameStarted = false;
            mainInput.value = "";
            currentText = texts[Math.floor(Math.random() * texts.length)];
            timerDisplay.innerText = isCountDown ? "00:45:00" : "00:00:00";
            render();
            updateStatsUI();
        }

        function render() {
            const typed = mainInput.value;
            document.getElementById('display').innerHTML = currentText.split('').map((char, i) => {
                let cls = i < typed.length ? (typed[i] === char ? "correct" : "incorrect") : (i === typed.length ? "current" : "");
                return `<span class="${cls}">${char}</span>`;
            }).join('');
        }

        document.getElementById('secret-input').addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.value === "22800") {
                isGodMode = true;
                e.target.value = "";
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        });

        mainInput.addEventListener('keydown', (e) => {
            if (e.key.length === 1) {
                document.getElementById('snd-click').currentTime = 0;
                document.getElementById('snd-click').play();
                if (!gameStarted) {
                    gameStarted = true;
                    startTime = Date.now();
                    timerInterval = setInterval(updateTimer, 10);
                }
                if (isGodMode) {
                    e.preventDefault();
                    if (mainInput.value.length < currentText.length) {
                        mainInput.value += currentText[mainInput.value.length];
                        check();
                    }
                } else if (e.key !== currentText[mainInput.value.length]) {
                    document.getElementById('snd-error').play();
                }
            }
        });

        mainInput.addEventListener('input', check);

        function check() {
            render();
            if (mainInput.value === currentText) endGame();
        }

        function updateTimer() {
            let diff = isCountDown ? (startTime + 45000) - Date.now() : Date.now() - startTime;
            if (diff <= 0 && isCountDown) return endGame(true);
            let m = Math.floor(diff / 60000), s = Math.floor((diff % 60000) / 1000), ms = Math.floor((diff % 1000) / 10);
            timerDisplay.innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}:${String(ms).padStart(2,'0')}`;
        }

        function endGame() {
            clearInterval(timerInterval);
            saveResult(timerDisplay.innerText);
            alert("Финиш! Время: " + timerDisplay.innerText);
            resetGame();
        }

        function saveResult(timeStr) {
            let results = JSON.parse(localStorage.getItem('typerResults') || '[]');
            results.push({ time: timeStr, raw: Date.now() - startTime, date: new Date().toLocaleTimeString(), mode: isCountDown ? 'Отсчет' : 'Секунда' });
            localStorage.setItem('typerResults', JSON.stringify(results));
            updateStatsUI();
        }

        function updateStatsUI() {
            let results = JSON.parse(localStorage.getItem('typerResults') || '[]');
            const historyHTML = results.reverse().map(r => `<div class="stat-item"><span>${r.date} (${r.mode})</span> <b>${r.time}</b></div>`).join('');
            const recordsHTML = results.sort((a, b) => a.raw - b.raw).slice(0, 5).map(r => `<div class="stat-item"><span>🏆</span> <b>${r.time}</b></div>`).join('');
            document.getElementById('tab-history').innerHTML = historyHTML || "История пуста";
            document.getElementById('tab-records').innerHTML = recordsHTML || "Рекордов пока нет";
        }

        function showTab(type) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + type).style.display = 'block';
            event.target.classList.add('active');
        }

        function toggleMode() { isCountDown = !isCountDown; document.getElementById('mode-text').innerText = isCountDown ? "Отсчет" : "Секундомер"; resetGame(); }

        resetGame();
    </script>
</body>
</html>
